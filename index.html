<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador Sem Repetição</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Alterado para min-height para acomodar a lista */
            margin: 0;
            background-color: #f0f2f5;
            padding: 20px;
        }

        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 300px;
        }

        h1 {
            color: #333;
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        #numero {
            font-size: 4rem;
            font-weight: bold;
            color: #007bff;
            margin: 20px 0;
            min-height: 80px;
        }

        button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover {
            background-color: #218838;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #status {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #666;
        }

        /* --- NOVOS ESTILOS PARA O HISTÓRICO --- */
        .historico-container {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            text-align: left;
        }

        .historico-titulo {
            font-size: 0.9rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 10px;
            display: block;
        }

        #lista-sorteados {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            min-height: 30px;
        }

        .badge-numero {
            background-color: #e9ecef;
            color: #495057;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Sorteador João Dagostim</h1>
        <span>Boa sorte!</span>
        <div id="numero">-</div>

        <button id="btnGerar" onclick="gerarProximo()">Gerar Número</button>

        <div id="status">Restam <span id="contador">5</span> números</div>

        <button onclick="resetar()" style="margin-top: 10px; background-color: #dc3545; font-size: 0.8rem;">Resetar</button>

        <div class="historico-container">
            <span class="historico-titulo">Números já sorteados:</span>
            <div id="lista-sorteados">
            </div>
        </div>
    </div>

    <script>
        let numeros = [];
        let sorteados = []; // Array para guardar o que já saiu
        const min = 1;
        const max = 300;

        function inicializar() {
            numeros = [];
            sorteados = []; // Limpa o histórico no código
            document.getElementById("lista-sorteados").innerHTML = ""; // Limpa visualmente

            for (let i = min; i <= max; i++) {
                numeros.push(i);
            }

            for (let i = numeros.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [numeros[i], numeros[j]] = [numeros[j], numeros[i]];
            }
            atualizarInterface("-");
        }

        function gerarProximo() {
            if (numeros.length > 0) {
                const num = numeros.pop();
                sorteados.push(num); // Adiciona ao histórico

                adicionarAoHistoricoVisual(num);
                atualizarInterface(num);
            } else {
                alert("Todos os números foram sorteados!");
                document.getElementById("btnGerar").disabled = true;
            }
        }

        // Função para criar as "bolinhas" de números sorteados
        function adicionarAoHistoricoVisual(num) {
            const lista = document.getElementById("lista-sorteados");
            const span = document.createElement("span");
            span.className = "badge-numero";
            span.innerText = num;
            lista.appendChild(span);
        }

        function atualizarInterface(valor) {
            document.getElementById("numero").innerText = valor;
            document.getElementById("contador").innerText = numeros.length;
        }

        function resetar() {
            if (confirm("Deseja resetar e começar do zero?")) {
                document.getElementById("btnGerar").disabled = false;
                inicializar();
            }
        }

        window.onload = inicializar;
    </script>

</body>

</html>
